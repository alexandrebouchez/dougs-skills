name: Bug report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please don't include your `~/.dougs-session` cookie or your `.claude/dougs.local.md` legal info — they're sensitive.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior you observed and what you expected instead.
      placeholder: |
        I ran `/dougs:create-quote` and …
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Mask any private data.
      placeholder: |
        1. Run `npx @drivenlabs/dougs`
        2. …
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Output of `cat plugin/.claude-plugin/plugin.json | grep version`
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: 'e.g. 2.x.y'

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: 'e.g. v20.10.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the CLI stderr or the Claude conversation output. Mask cookies/tokens/SIRET.
      render: shell
